name: Notebook Syntax Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Notebook & Code Quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulum
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install nbformat nbconvert

      - name: Notebook formatını doğrula
        run: |
          python - <<'EOF'
          import json, sys, pathlib
          nb_files = list(pathlib.Path('.').glob('*.ipynb'))
          if not nb_files:
              print("Notebook bulunamadı")
              sys.exit(0)
          errors = []
          for f in nb_files:
              try:
                  nb = json.loads(f.read_text(encoding='utf-8'))
                  n_cells = len(nb.get('cells', []))
                  print(f"✓ {f.name}: {n_cells} hücre — format geçerli")
              except Exception as e:
                  errors.append(f"✗ {f.name}: {e}")
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          EOF

      - name: Python sözdizimi kontrolü
        run: |
          python - <<'EOF'
          import json, ast, pathlib, sys
          nb_files = list(pathlib.Path('.').glob('*.ipynb'))
          errors = []
          for f in nb_files:
              nb = json.loads(f.read_text(encoding='utf-8'))
              for i, cell in enumerate(nb.get('cells', [])):
                  if cell.get('cell_type') == 'code':
                      src = ''.join(cell.get('source', []))
                      if src.strip():
                          try:
                              ast.parse(src)
                          except SyntaxError as e:
                              errors.append(f"✗ {f.name} Hücre {i}: {e}")
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          else:
              print("✓ Tüm kod hücreleri sözdizimi açısından geçerli")
          EOF
